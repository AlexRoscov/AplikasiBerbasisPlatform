<!DOCTYPE html>
<html>

<head>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

  <h2>The jQuery AJAX</h2>
  <p id="demi-kan">AJAX akan mengubah teks ini</p>
  <button type="button" id="changeBtn">Rubah Konten</button>

  <script>
    $(document).ready(function () {
      $("#changeBtn").click(function () {
        $.ajax({
          url: "ajax_info.txt",
          type: "GET",
          data: {
            id: 116,
            name: "Raihan"
          },
          dataType: "html",
          timeout: 5000,
          success: function (result) {
            $("#demi-kan").html(result);
          },
          error: function (xhr, status, error) {
            $("#demi-kan").html("Error: " + error);
          },
          complete: function (xhr, status) {
            console.log("Request completed with status: " + status);
          }
        });
      });
    });
  </script>

</body>

</html>
